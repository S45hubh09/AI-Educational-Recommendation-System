<!DOCTYPE html>
<html>
<head>
    <title>Video Player</title>

    <style>
        body {
            margin: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            font-family: Arial;
        }

        iframe {
            width: 80%;
            height: 450px;
            border-radius: 10px;
        }

        a {
            margin-top: 20px;
            color: cyan;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <h2>▶ Learning Video</h2>

    <iframe
        src="https://www.youtube.com/embed/{{ video_id }}"
        frameborder="0"
        allowfullscreen>
    </iframe>

    <a href="/">⬅ Back to Home</a>

</body>
</html>
