<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No Educational Content</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
            position: relative;
            overflow: hidden;
        }

        /* Subtle red glow on dark background */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 20%, rgba(239, 68, 68, 0.12) 0%, transparent 60%);
            pointer-events: none;
        }

        .container {
            background: rgba(255, 255, 255, 0.97);   /* Light & Clean */
            backdrop-filter: blur(20px);
            max-width: 480px;
            width: 92%;
            border-radius: 24px;
            box-shadow: 0 25px 60px -10px rgba(0, 0, 0, 0.35);
            padding: 55px 45px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.9);
        }

        .error-icon {
            width: 138px;
            height: 138px;
            background: #fee2e2;
            border-radius: 50%;
            margin: 0 auto 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 8px solid #ef4444;
            animation: shake 0.8s ease-in-out;
        }

        .error-icon::before {
            content: "✕";
            font-size: 72px;
            color: #ef4444;
            font-weight: 700;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 29px;
            font-weight: 600;
            color: #1e2937;
            margin-bottom: 18px;
        }

        .message {
            font-size: 16.2px;
            line-height: 1.65;
            color: #475569;
            margin-bottom: 38px;
        }

        .highlight {
            background: #fee2e2;
            padding: 3px 9px;
            border-radius: 6px;
            font-weight: 600;
            color: #b91c1c;
        }

        .motivation {
            font-size: 21px;
            font-weight: 600;
            line-height: 1.45;
            background: linear-gradient(90deg, #fef3c7, #fde68c);   /* Original Yellow */
            padding: 22px 28px;
            border-radius: 16px;
            margin-bottom: 40px;
            border-left: 6px solid #f59e0b;
            box-shadow: 0 10px 15px -3px rgba(245, 158, 11, 0.25);
            color: #1e2937;
        }

        .btn {
            background: #ef4444;
            color: white;
            padding: 15px 34px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16.5px;
            box-shadow: 0 12px 25px rgba(239, 68, 68, 0.4);
            transition: all 0.4s ease;
        }

        .btn:hover {
            background: #dc2626;
            transform: translateY(-4px) scale(1.04);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="error-icon"></div>
        <h1>No Educational Content Found</h1>

        <div class="message">
            This platform strictly allows <span class="highlight">educational content</span> only.
        </div>

        <div class="motivation">
            "Distraction delays success.<br>Stay focused on learning."
        </div>

        <a href="/" class="btn">← Try Again</a>
    </div>

</body>
</html>
