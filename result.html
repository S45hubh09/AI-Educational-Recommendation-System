<!DOCTYPE html>
<html>
<head>
    <title>Results</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f0f0f;
            color: #00f2ff;
            text-align: center;
        }

        h2 {
            padding: 20px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            width: 260px;
            margin: 15px;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid #00f2ff;
            box-shadow: 0 0 15px #00f2ff;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px #00f2ff;
        }

        img {
            width: 100%;
        }

        .title {
            padding: 10px;
        }

        a {
            color: #00f2ff;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-shadow: 0 0 10px #00f2ff;
        }

        button {
            margin: 20px;
            padding: 10px 20px;
            background: black;
            color: #00f2ff;
            border: 2px solid #00f2ff;
            border-radius: 10px;
            cursor: pointer;
        }

        button:hover {
            background: #00f2ff;
            color: black;
            box-shadow: 0 0 15px #00f2ff;
        }
         <iframe
            width="800"
            height="450"
            src="https://www.youtube.com/embed/VIDEO_ID"
            frameborder="0"
            allowfullscreen>
      </iframe>
    </style>
</head>

<body>

<h2>⚡ Recommended Videos for {{ topic }} ({{ level }})</h2>

<div class="container">
    {% for video in videos %}
        <div class="card">
            <img src="https://img.youtube.com/vi/{{ video.video_id }}/0.jpg">
            
            <div class="title">
           <a href="/video/{{ video.video_id }}">                    {{ video.title }}
                </a>

                <p> {{ video.views }} views</p>
                <p> {{ video.likes }} likes</p>

            </div>
        </div>
    {% endfor %}
</div>

<a href="/"><button>⬅ Go Back</button></a>

</body>
</html>
