<!DOCTYPE html>
<html>
<head>
    <title>LearnSmart AI</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            height: 100vh;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #00f2ff;
            overflow: hidden;
        }

        /* Background glow circles */
        body::before, body::after {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: #00f2ff;
            filter: blur(150px);
            opacity: 0.3;
            z-index: 0;
        }

        body::before {
            top: 10%;
            left: 20%;
        }

        body::after {
            bottom: 10%;
            right: 20%;
        }

        .box {
            position: relative;
            z-index: 1;
            border: 2px solid #00f2ff;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 25px #00f2ff;
            width: 320px;
            backdrop-filter: blur(10px);
        }

        h2 {
            margin-bottom: 20px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #00f2ff;
            background: black;
            color: #00f2ff;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: black;
            color: #00f2ff;
            border: 2px solid #00f2ff;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #00f2ff;
            color: black;
            box-shadow: 0 0 15px #00f2ff;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<div class="box">
    <h2>⚡ LearnSmart AI</h2>

    <form action="/recommend" method="POST">
        <input type="text" name="topic" placeholder="Enter Topic..." required>


        <select name="level">
            <option>Beginner</option>
            <option>Intermediate</option>
            <option>Advanced</option>
        </select>
        <button type="submit">Get Recommendation</button>
    </form>
</div>

</body>
</html>
